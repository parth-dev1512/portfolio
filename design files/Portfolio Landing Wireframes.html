<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio · Landing Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #f6f1e6;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: #1a1a1a;
  }

  /* Background scroll animations (used inside each variation) */
  @keyframes bgScrollV {
    from { transform: translate3d(0, 0, 0); }
    to   { transform: translate3d(0, -50%, 0); }
  }
  @keyframes bgScrollD {
    from { transform: translate3d(0, 0, 0); }
    to   { transform: translate3d(-15%, -50%, 0); }
  }
  @keyframes bgScrollH {
    from { transform: translate3d(0, 0, 0); }
    to   { transform: translate3d(-50%, 0, 0); }
  }
  .bg-scroll-v { animation: bgScrollV 60s linear infinite; }
  .bg-scroll-d { animation: bgScrollD 80s linear infinite; }
  .bg-scroll-h { animation: bgScrollH 90s linear infinite; }

  /* Print-friendly default fonts available even offline (Caveat falls back to Comic Sans / cursive) */
  body, h1, h2, h3, p, ul, ol, li, span, div { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="variations.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "blur": 2,
  "motion": "vertical",
  "frosted": false,
  "paused": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas
        title="Portfolio · Landing Page Wireframes"
        subtitle="A polymath's visiting card — 5 directions for the white card + blurred scrolling background. Caveat (sketchy) + mono annotations + B&W with one warm accent."
      >
        <DCSection id="landings" title="Landing page · 5 directions">
          <DCArtboard id="v1" label="V1 · Centered horizontal" width={840} height={600}>
            <V1 tweaks={tweaks} />
          </DCArtboard>
          <DCArtboard id="v2" label="V2 · Tall stacked" width={840} height={600}>
            <V2 tweaks={tweaks} />
          </DCArtboard>
          <DCArtboard id="v3" label="V3 · Card + disciplines index" width={840} height={600}>
            <V3 tweaks={tweaks} />
          </DCArtboard>
          <DCArtboard id="v4" label="V4 · Polaroid · tilted" width={840} height={600}>
            <V4 tweaks={tweaks} />
          </DCArtboard>
          <DCArtboard id="v5" label="V5 · Wide letterbox · low-quiet" width={840} height={600}>
            <V5 tweaks={tweaks} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Background">
          <TweakSlider label="Blur" value={tweaks.blur} min={0} max={14} step={1} onChange={(v) => setTweak('blur', v)} />
          <TweakRadio
            label="Motion"
            value={tweaks.motion}
            options={['vertical', 'diagonal', 'marquee', 'static']}
            onChange={(v) => setTweak('motion', v)}
          />
          <TweakToggle label="Pause motion" value={tweaks.paused} onChange={(v) => setTweak('paused', v)} />
        </TweakSection>
        <TweakSection label="Card">
          <TweakToggle label="Frosted glass card" value={tweaks.frosted} onChange={(v) => setTweak('frosted', v)} />
        </TweakSection>
        <div style={{ fontFamily: 'ui-monospace, monospace', fontSize: 10, color: '#888', marginTop: 8, lineHeight: 1.4 }}>
          tweaks affect every artboard at once — easier to compare directions under the same conditions.
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
