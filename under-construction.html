<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction · Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            background-image: radial-gradient(#f0f0f0 1px, transparent 0);
            background-size: 15px 15px;
            font-family: 'Inter', sans-serif;
            color: #000;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 40px;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.05);
            max-width: 90%;
        }
        img {
            max-width: 250px;
            height: auto;
            border-radius: 4px;
        }
        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 32px;
            margin: 0;
        }
        p {
            font-size: 14px;
            color: #555;
            margin: 0;
            max-width: 300px;
            line-height: 1.5;
        }
        .btn-back {
            margin-top: 16px;
            display: inline-block;
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: border-color 0.2s;
        }
        .btn-back:hover {
            border-color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Replaced with the image provided by the user (Bob the Builder) -->
        <img src="under-construction-bob.jpg" alt="Under Construction">
        
        <div>
            <h1>Under Construction</h1>
            <div style="height: 1px; width: 40px; background: #ddd; margin: 16px auto;"></div>
            <p>I am currently laying the bricks and building the bridges to this portfolio section. Check back soon.</p>
        </div>
        
        <a href="index.html" class="btn-back">← Return to Visiting Card</a>
    </div>
</body>
</html>
